次は最重要ファイル、GitHub Actionsの自動実行設定です。

画面上部の 「japan-news」 という青いリンクをクリックしてトップに戻り、「Add file」→「Create new file」 をクリックしてください。

① ファイル名欄に入力

.github/workflows/update-news.yml
（.github/ から始まる点に注意。スラッシュを打つたびにフォルダが作られます）

② 内容欄に貼り付け

yaml
name: 🗾 日本ニュース 毎朝自動更新

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages:    write
  id-token: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch & Translate News
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_translate.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "変更なし — コミットをスキップ"
          else
            DATE=$(TZ=Asia/Tokyo date '+%Y年%m月%d日 %H:%M JST')
            git commit -m "🗾 ニュース更新: ${DATE}"
            git push
          fi
③ 右上「Commit changes」→「Commit changes」

